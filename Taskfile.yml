version: '3'

vars:
  PROJECT_ROOT:
    sh: pwd
  GOBIN: '{{.PROJECT_ROOT}}/bin'
  GOLANGCI_LINT_LOCAL_BINARY: '{{.GOBIN}}/golangci-lint'
  REQUIRED_GOLANGCI_LINT_VERSION:
    sh: cat .golangci.version 2>/dev/null || echo "2.12.2"
  GOLANGCI_LINT_BINARY:
    sh: |
      required="$(cat .golangci.version 2>/dev/null || echo "2.12.2")"
      for candidate in "$(command -v golangci-lint 2>/dev/null || true)" "{{.GOLANGCI_LINT_LOCAL_BINARY}}"; do
        [ -n "$candidate" ] || continue
        [ -x "$candidate" ] || continue
        version="$("$candidate" version --format short 2>/dev/null || "$candidate" version --short 2>/dev/null || true)"
        if [ "$version" = "$required" ]; then
          echo "$candidate"
          exit 0
        fi
      done
      echo "{{.GOLANGCI_LINT_LOCAL_BINARY}}"
  GOLANGCI_LINT_VERSION:
    sh: |
      {{.GOLANGCI_LINT_BINARY}} version --format short 2>/dev/null ||
      {{.GOLANGCI_LINT_BINARY}} version --short 2>/dev/null ||
      echo "not-installed"
  MODULES:
    sh: printf '. ./pool\n'

env:
  GOBIN: '{{.GOBIN}}'

tasks:
  default:
    desc: Run lint and test
    cmds:
      - task: lint
      - task: test

  help:
    desc: Show this help message
    cmds:
      - echo "emitter - High-performance event emitter library for Go"
      - echo "Available targets:"
      - task --list
    silent: true

  clean:
    desc: Clean build artifacts and caches
    cmds:
      - echo "Cleaning build artifacts..."
      - rm -rf {{.GOBIN}}
      - go clean -cache -testcache || true

  deps:
    desc: Download Go module dependencies
    cmds:
      - |
        set -e
        echo "Downloading dependencies..."
        for dir in {{.MODULES}}; do
          echo "==> $dir"
          (cd "$dir" && GOWORK=off go mod download && GOWORK=off go mod tidy)
        done


  deps:update:
    desc: Update dependencies for the root module and any nested modules
    cmds:
      - |
        set -e
        echo "Updating dependencies..."
        MODULES=". $(find . -mindepth 2 -name go.mod \
          -not -path '*/vendor/*' -not -path '*/.*' \
          -exec dirname {} \; | sort)"
        for dir in $MODULES; do
          echo "==> $dir"
          (
            cd "$dir"
            replaced=$(awk '
              /^replace[[:space:]]+[^(]/ { print $2 }
              /^replace[[:space:]]*\(/ { f=1; next }
              f && /^\)/ { f=0; next }
              f && /=>/ { print $1 }
            ' go.mod)
            deps=$(awk '
              /^require[[:space:]]+[^(]/ { print $2 }
              /^require[[:space:]]*\(/ { f=1; next }
              f && /^\)/ { f=0; next }
              f && !/\/\/ indirect/ && NF >= 2 { print $1 }
            ' go.mod | while read -r dep; do
              echo "$replaced" | grep -qxF "$dep" || echo "$dep"
            done | tr '\n' ' ')
            if [ -n "$deps" ]; then
              GOWORK=off go get -u $deps
            fi
            GOWORK=off go mod tidy
          )
        done
        if [ -f go.work ]; then
          echo "==> go work sync"
          go work sync
        fi

  deps:submodules:
    desc: Init/reset nested git submodules for this repository
    cmds:
      - |
        set -eu
        if [ ! -f .gitmodules ]; then
          echo "No nested submodules."
          exit 0
        fi
        git submodule sync --recursive
        git submodule update --init --recursive --remote --force
        git submodule foreach --recursive 'git reset --hard && git clean -fd' || true
        git submodule sync --recursive
        git submodule update --init --recursive --remote --force

  test:
    desc: Run all module tests with race detection
    cmds:
      - |
        set -e
        echo "Running all tests..."
        for dir in {{.MODULES}}; do
          echo "==> $dir"
          (cd "$dir" && GOWORK=off go test -race ./...)
        done

  test-fuzz:
    desc: Run fuzz tests
    cmds:
      - echo "Running fuzz tests..."
      - go test -fuzz=FuzzMatchTopicPattern -fuzztime=10s .

  vet-shadow:
    desc: Check for shadowed variables
    cmds:
      - echo "Checking for shadowed variables..."
      - go vet -shadow ./... || true

  lint:
    desc: Run all linters
    deps:
      - golangci-lint
      - tidy-lint

  install-golangci-lint:
    desc: Install golangci-lint with the required version
    cmds:
      - mkdir -p "{{.GOBIN}}"
      - |
        if [ "{{.GOLANGCI_LINT_VERSION}}" != "{{.REQUIRED_GOLANGCI_LINT_VERSION}}" ]; then
          echo "Installing golangci-lint v{{.REQUIRED_GOLANGCI_LINT_VERSION}}..."
          GOBIN="{{.GOBIN}}" go install \
            github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v{{.REQUIRED_GOLANGCI_LINT_VERSION}}
          echo "golangci-lint v{{.REQUIRED_GOLANGCI_LINT_VERSION}} installed successfully"
        fi
    status:
      - test "{{.GOLANGCI_LINT_VERSION}}" = "{{.REQUIRED_GOLANGCI_LINT_VERSION}}"

  golangci-lint:
    desc: Run golangci-lint
    deps:
      - install-golangci-lint
    cmds:
      - '{{.GOLANGCI_LINT_BINARY}} version'
      - |
        set -e
        echo "Running golangci-lint..."
        lint_binary="{{.GOLANGCI_LINT_BINARY}}"
        for dir in {{.MODULES}}; do
          echo "==> $dir"
          (cd "$dir" && GOWORK=off "$lint_binary" run --timeout=30m --concurrency=1 --path-prefix=.)
        done

  tidy-lint:
    desc: Check if go.mod and go.sum are tidy
    cmds:
      - |
        set -e
        echo "Checking go.mod and go.sum are tidy..."
        for dir in {{.MODULES}}; do
          echo "==> $dir"
          (cd "$dir" && GOWORK=off go mod tidy)
        done
        git diff --exit-code -- go.mod go.sum pool/go.mod pool/go.sum

  yamllint:
    desc: Run yamllint
    cmds:
      - yamllint -s .

  vuln:
    desc: Run govulncheck
    cmds:
      - |
        set -e
        for dir in {{.MODULES}}; do
          echo "==> $dir"
          (cd "$dir" && GOWORK=off govulncheck ./...)
        done

  fmt:
    desc: Format Go code
    deps:
      - install-golangci-lint
    cmds:
      - |
        set -e
        echo "Formatting Go code..."
        lint_binary="{{.GOLANGCI_LINT_BINARY}}"
        for dir in {{.MODULES}}; do
          echo "==> $dir"
          (cd "$dir" && GOWORK=off "$lint_binary" fmt ./...)
        done

  vet:
    desc: Run go vet
    cmds:
      - |
        set -e
        echo "Running go vet..."
        for dir in {{.MODULES}}; do
          echo "==> $dir"
          (cd "$dir" && GOWORK=off go vet ./...)
        done

  verify:
    desc: Run all verification steps (deps, format, vet, lint, test, vuln)
    cmds:
      - task: deps
      - task: fmt
      - task: vet
      - task: lint
      - task: test
      - task: vuln
      - echo "All verification steps completed successfully ✅"
